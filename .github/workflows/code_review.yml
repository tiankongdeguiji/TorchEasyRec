name: Code Review
on:
  pull_request_target:
    types: [opened, reopened, synchronize]

concurrency:
  group: codereview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: tzrec-codereview-runner
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: FetchCommit ${{ github.event.pull_request.head.sha }}
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: RunCodeReview
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            /review REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number }}

            **CRITICAL RESTRICTIONS:**
            1. **NO CODE EXECUTION:** Rely exclusively on reading file contents and static analysis. You cannot run `python`, `bash`, or any shell commands other than `gh` tools. Do not attempt to verify code by executing it.
            2. **NO INLINE POSITIVE COMMENTS OR PRAISE:** inline comments should only point out problems and issues
            3. **ONLY COMMENT ON CHANGED LINES:** When creating inline comments, you MUST only comment on lines that are part of the actual diff. Use `gh pr diff` to identify the exact lines that changed before creating comments.

            Provide detailed feedback using inline comments for specific issues.
            Use top-level comments for general problem observations.
          claude_args: |
            --model ${{ secrets.ANTHROPIC_MODEL }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          show_full_output: true
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
